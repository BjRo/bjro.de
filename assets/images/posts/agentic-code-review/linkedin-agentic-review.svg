<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="title desc">
  <title id="title">Agentic verification and human production stewardship</title>
  <desc id="desc">Editorial LinkedIn image showing pull request review bottlenecks, agentic verification evidence, and human rollout stewardship.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071012"/>
      <stop offset="0.45" stop-color="#102024"/>
      <stop offset="1" stop-color="#171612"/>
    </linearGradient>
    <linearGradient id="tealLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2c6d66"/>
      <stop offset="0.52" stop-color="#90e6d5"/>
      <stop offset="1" stop-color="#f1ba69"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5fff9" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#d8fff4" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="evidence" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff3d2"/>
      <stop offset="1" stop-color="#d8fff4"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.56 0 0 0 0 0.9 0 0 0 0 0.82 0 0 0 0.45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d8fff4" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .micro { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 15px; font-weight: 650; }
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .glass { fill: url(#panel); stroke: #cffff4; stroke-opacity: 0.20; }
      .muted { fill: #a7bfba; }
      .cream { fill: #fff2d0; }
      .teal { fill: #8ee6d7; }
      .amber { fill: #f1ba69; }
    </style>
  </defs>

  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect width="1200" height="627" fill="url(#grid)"/>
  <circle cx="938" cy="270" r="230" fill="#f1ba69" opacity="0.07"/>
  <circle cx="475" cy="315" r="260" fill="#8ee6d7" opacity="0.06"/>

  <g class="sans">
    <text x="72" y="76" class="micro muted">Agentic engineering</text>
    <text x="72" y="130" font-size="48" font-weight="830" fill="#f8fff8">Code review isn't dead.</text>
    <text x="72" y="184" font-size="48" font-weight="830" fill="#f8fff8">The pull request might be.</text>
    <text x="76" y="224" font-size="19" font-weight="560" fill="#b8ccc7">From review bottlenecks to evidence-driven verification.</text>
    <text x="76" y="253" font-size="19" font-weight="560" fill="#b8ccc7">With humans still accountable for production change.</text>
  </g>

  <g filter="url(#softGlow)">
    <path d="M118 384 C256 332 337 413 450 362 C574 306 650 329 760 370 C868 410 964 345 1078 286" class="line" stroke="url(#tealLine)" stroke-width="8"/>
    <path d="M118 384 C256 332 337 413 450 362 C574 306 650 329 760 370 C868 410 964 345 1078 286" class="line" stroke="#eafff8" stroke-opacity="0.35" stroke-width="2"/>
  </g>

