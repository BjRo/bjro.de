      <rect x="18" y="20" width="60" height="16" rx="8" fill="#102629"/>
      <circle cx="62" cy="28" r="12" fill="#8ee6d7"/>
      <rect x="18" y="51" width="88" height="8" rx="4" fill="#fff2d0" opacity="0.33"/>
    </g>
    <g transform="translate(166 214)">
      <rect x="0" y="0" width="128" height="78" rx="18" fill="#f1ba69" opacity="0.14" stroke="#f1ba69" stroke-opacity="0.28"/>
      <rect x="18" y="20" width="60" height="16" rx="8" fill="#102629"/>
      <circle cx="34" cy="28" r="12" fill="#f1ba69"/>
      <rect x="18" y="51" width="88" height="8" rx="4" fill="#fff2d0" opacity="0.33"/>
    </g>

    <g transform="translate(111 132)">
      <circle cx="48" cy="33" r="24" fill="#fff2d0"/>
      <path d="M18 112 C20 75 75 75 78 112 Z" fill="#173236" stroke="#8ee6d7" stroke-opacity="0.35"/>
      <path d="M18 112 C36 92 60 92 78 112" class="line" stroke="#f1ba69" stroke-width="4"/>
    </g>
  </g>

  <g class="sans" transform="translate(78 604)">
    <rect x="0" y="-26" width="1044" height="1" fill="#eafff8" opacity="0.16"/>
    <text x="0" y="0" font-size="16" font-weight="650" fill="#8ee6d7">evidence</text>
    <text x="93" y="0" font-size="16" font-weight="650" fill="#f8fff8" opacity="0.70">over ceremony</text>
    <circle cx="235" cy="-5" r="4" fill="#f1ba69"/>
    <text x="256" y="0" font-size="16" font-weight="650" fill="#8ee6d7">agents</text>
    <text x="318" y="0" font-size="16" font-weight="650" fill="#f8fff8" opacity="0.70">verify and rework</text>
    <circle cx="480" cy="-5" r="4" fill="#f1ba69"/>
    <text x="501" y="0" font-size="16" font-weight="650" fill="#8ee6d7">humans</text>
    <text x="574" y="0" font-size="16" font-weight="650" fill="#f8fff8" opacity="0.70">steward rollout</text>
  </g>
</svg>
