      <circle cx="196" cy="43" r="5" fill="#f1ba69"/>
      <rect x="209" y="38" width="28" height="8" rx="4" fill="#fff2d0" opacity="0.36"/>
      <rect x="42" y="0" width="204" height="96" rx="13" fill="#12282a" stroke="#cffff4" stroke-opacity="0.16"/>
      <rect x="60" y="19" width="86" height="8" rx="4" fill="#8ee6d7" opacity="0.75"/>
      <rect x="60" y="43" width="150" height="7" rx="3.5" fill="#effff8" opacity="0.20"/>
      <rect x="60" y="64" width="118" height="7" rx="3.5" fill="#effff8" opacity="0.14"/>
      <rect x="168" y="79" width="76" height="45" rx="12" fill="#fff2d0" opacity="0.13" stroke="#fff2d0" stroke-opacity="0.24"/>
      <circle cx="188" cy="101" r="5" fill="#f1ba69"/>
      <rect x="202" y="96" width="25" height="8" rx="4" fill="#fff2d0" opacity="0.34"/>
      <g opacity="0.9">
        <path d="M246 40 C268 76 270 115 251 154" class="line" stroke="#f1ba69" stroke-width="4"/>
        <path d="M251 154 L239 141 M251 154 L266 146" class="line" stroke="#f1ba69" stroke-width="4"/>
      </g>
    </g>
    <rect x="24" y="205" width="114" height="24" rx="12" fill="#f1ba69" opacity="0.16"/>
    <rect x="150" y="205" width="90" height="24" rx="12" fill="#8ee6d7" opacity="0.13"/>
  </g>

  <g transform="translate(414 250)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="354" height="318" rx="28" class="glass"/>
    <text x="27" y="42" class="sans label cream">Agentic verification</text>
    <g transform="translate(34 70)">
      <g transform="translate(93 0)">
        <path d="M60 0 L112 30 L112 90 L60 120 L8 90 L8 30 Z" fill="#102629" stroke="#8ee6d7" stroke-opacity="0.68" stroke-width="2"/>
        <path d="M60 18 L94 38 L94 78 L60 98 L26 78 L26 38 Z" fill="#8ee6d7" opacity="0.11"/>
