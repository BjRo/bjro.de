        <rect x="18" y="20" width="48" height="8" rx="4" fill="#1f6f63" opacity="0.45"/>
        <rect x="18" y="42" width="34" height="8" rx="4" fill="#183134" opacity="0.22"/>
        <rect x="18" y="64" width="52" height="8" rx="4" fill="#183134" opacity="0.18"/>
      </g>
      <g transform="translate(202 148)">
        <rect x="0" y="0" width="84" height="80" rx="14" fill="url(#evidence)" opacity="0.9"/>
        <rect x="17" y="18" width="50" height="32" rx="6" fill="#173236" opacity="0.34"/>
        <path d="M26 37 L38 27 L51 43 L58 34 L67 49 L18 49 Z" fill="#8ee6d7" opacity="0.8"/>
        <circle cx="55" cy="28" r="5" fill="#f1ba69"/>
      </g>

      <path d="M153 121 L42 148 M162 121 L143 137 M171 121 L244 148" class="line" stroke="#8ee6d7" stroke-opacity="0.55" stroke-width="3"/>
    </g>
    <g transform="translate(32 269)">
      <rect x="0" y="0" width="72" height="10" rx="5" fill="#8ee6d7" opacity="0.68"/>
      <rect x="88" y="0" width="72" height="10" rx="5" fill="#fff2d0" opacity="0.46"/>
      <rect x="176" y="0" width="72" height="10" rx="5" fill="#f1ba69" opacity="0.58"/>
      <rect x="264" y="0" width="34" height="10" rx="5" fill="#eafff8" opacity="0.24"/>
    </g>
  </g>

  <g transform="translate(810 236)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="318" height="342" rx="28" class="glass"/>
    <text x="26" y="44" class="sans label cream">Production stewardship</text>

    <g transform="translate(24 74)">
