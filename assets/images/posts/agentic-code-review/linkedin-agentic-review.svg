        <path d="M18 24 L33 39 L62 18" class="line" stroke="#1f6f63" stroke-width="6"/>
        <rect x="18" y="56" width="48" height="6" rx="3" fill="#183134" opacity="0.30"/>
      </g>
      <g transform="translate(101 137)">
